<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Buses</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
            background:#f5f5f5;
        }
        h2{
            text-align:center;
            color:#007BFF;
        }
        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }
        th,td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }
        th{
            background:#007BFF;
            color:white;
        }
    </style>
</head>
<body>

<h2>Bus Details</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Bus Number</th>
        <th>Route</th>
        <th>Current Location</th>
        <th>Destination</th>
        <th>Status</th>
        <th>Update</th>
        <th>Delete</th>
    </tr>

    <tr th:each="bus : ${buses}">
    <td th:text="${bus.id}"></td>
    <td th:text="${bus.busNumber}"></td>
    <td th:text="${bus.route}"></td>
    <td th:text="${bus.currentLocation}"></td>
    <td th:text="${bus.destination}"></td>
    <td th:text="${bus.status}"></td>

    <td>
        <a th:href="@{/editBus/{id}(id=${bus.id})}">Update</a>
    </td>

    <td>
        <a th:href="@{/deleteBus/{id}(id=${bus.id})}"
           onclick="return confirm('Delete this bus?')">Delete</a>
    </td>
</tr>

</table>

</body>
</html>
