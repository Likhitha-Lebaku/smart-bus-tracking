<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Bus</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>Update Bus</h1>

<form th:action="@{/updateBus}" th:object="${bus}" method="post">

    <input type="hidden" th:field="*{id}">

    <label>Bus Number:</label><br>
    <input type="text" th:field="*{busNumber}" required><br><br>

    <label>Current Location:</label><br>
    <input type="text" th:field="*{currentLocation}" required><br><br>

    <label>Destination:</label><br>
    <input type="text" th:field="*{destination}" required><br><br>

    <label>Driver Name:</label><br>
    <input type="text" th:field="*{driverName}" required><br><br>

    <button type="submit">Update Bus</button>

</form>

<br>

<a href="/viewBuses">Back to Bus List</a>

</body>
</html>
